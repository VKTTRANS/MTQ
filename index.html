<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบคิวช่าง - VKT Fleet</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f0f2f5; font-family: 'Kanit', sans-serif; }
    .navbar { background: #212529; }
    .kanban-col { min-width: 320px; flex: 1; background: #e9ecef; border-radius: 10px; padding: 15px; height: calc(100vh - 100px); overflow-y: auto; }
    .kanban-header { font-weight: bold; padding-bottom: 10px; border-bottom: 2px solid #ccc; margin-bottom: 15px; }
    .job-card { transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; border-left: 5px solid; }
    .job-card:hover { transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.15) !important; }
    .status-wait { border-color: #6c757d; }
    .status-doing { border-color: #0d6efd; }
    .status-parts { border-color: #ffc107; }
    #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark sticky-top mb-3 shadow-sm">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold"><i class="fas fa-tools text-warning"></i> ระบบคิวช่าง VKT</span>
    <button class="btn btn-sm btn-outline-light fw-bold" onclick="loadJobs()"><i class="fas fa-sync"></i> โหลดคิวใหม่</button>
  </div>
</nav>

<div class="container-fluid">
  <div class="row flex-nowrap overflow-auto pb-3">
    
    <div class="col-11 col-md-4 mb-3">
      <div class="kanban-col shadow-sm">
        <div class="kanban-header text-secondary"><i class="fas fa-clipboard-list"></i> รอซ่อม (<span id="cntWait">0</span>)</div>
        <div id="colWait"></div>
      </div>
    </div>
    
    <div class="col-11 col-md-4 mb-3">
      <div class="kanban-col shadow-sm bg-white border border-primary">
        <div class="kanban-header text-primary border-primary"><i class="fas fa-cogs"></i> กำลังซ่อม (<span id="cntDoing">0</span>)</div>
        <div id="colDoing"></div>
      </div>
    </div>
    
    <div class="col-11 col-md-4 mb-3">
      <div class="kanban-col shadow-sm bg-white border border-warning">
        <div class="kanban-header text-warning border-warning"><i class="fas fa-box-open"></i> รออะไหล่ (<span id="cntParts">0</span>)</div>
        <div id="colParts"></div>
      </div>
    </div>

  </div>
</div>

<div class="modal fade" id="jobModal">
  <div class="modal-dialog">
    <div class="modal-content border-0">
      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title"><i class="fas fa-wrench"></i> จัดการคิวงาน</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body bg-light">
        <div class="text-center mb-4">
           <h2 id="mPlate" class="fw-bold text-primary mb-1"></h2>
           <div id="mItem" class="fs-5 text-secondary fw-bold"></div>
           <div id="mMile" class="small text-muted mt-2"></div>
        </div>

        <div class="d-grid gap-2 mb-4">
           <button class="btn btn-primary fw-bold py-2" onclick="updateStatus('กำลังซ่อม')"><i class="fas fa-play"></i> เริ่มซ่อม (กำลังซ่อม)</button>
           <button class="btn btn-warning text-dark fw-bold py-2" onclick="updateStatus('รออะไหล่')"><i class="fas fa-pause"></i> พักงาน (รออะไหล่)</button>
           <button class="btn btn-secondary fw-bold py-2" onclick="updateStatus('รอซ่อม')"><i class="fas fa-undo"></i> ถอยกลับ (รอซ่อม)</button>
        </div>

        <div class="card border-success shadow-sm">
           <div class="card-body">
             <h6 class="fw-bold text-success mb-3"><i class="fas fa-check-circle"></i> ปิดงาน (เสร็จสิ้น)</h6>
             <div class="mb-2">
               <label class="form-label small fw-bold">ค่าใช้จ่ายรวม (บาท)</label>
               <input type="number" id="mCost" class="form-control form-control-lg text-end text-danger fw-bold" placeholder="0">
             </div>
             <div class="mb-3">
               <label class="form-label small fw-bold">ชื่อช่าง</label>
               <input type="text" id="mMechanic" class="form-control">
             </div>
             <button class="btn btn-success w-100 fw-bold py-2" onclick="completeJob()"><i class="fas fa-save"></i> บันทึกและปิดงาน</button>
           </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="loadingOverlay">
  <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
  <h5 class="mt-3 text-secondary fw-bold">กำลังอัปเดตข้อมูล...</h5>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  // 🔴🔴🔴 นำ URL ของคุณมาวางตรงนี้ 🔴🔴🔴
  const SCRIPT_URL = 'https://script.google.com/macros/s/xxxxxxxxxxxxxxxxxxxxx/exec';
  
  let jobsData = [];
  let currentJobId = null;

  window.onload = loadJobs;

  async function callAPI(payload) {
    try {
      const response = await fetch(SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
      const result = await response.json();
      if (result.status === 'success') return result.data;
      throw new Error(result.message);
    } catch (error) {
      Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
      document.getElementById('loadingOverlay').style.display = 'none';
      throw error;
    }
  }

  async function loadJobs() {
    document.getElementById('loadingOverlay').style.display = 'flex';
    jobsData = await callAPI({ action: 'getMechanicJobs' });
    document.getElementById('loadingOverlay').style.display = 'none';
    renderBoard();
  }

  function renderBoard() {
    const colW = document.getElementById('colWait');
    const colD = document.getElementById('colDoing');
    const colP = document.getElementById('colParts');

    colW.innerHTML = ''; colD.innerHTML = ''; colP.innerHTML = '';
    let cW = 0, cD = 0, cP = 0;

    jobsData.forEach(job => {
      let statusClass = job.status === 'รอซ่อม' ? 'status-wait' : job.status === 'กำลังซ่อม' ? 'status-doing' : 'status-parts';
      
      let card = `<div class="card mb-2 shadow-sm bg-white job-card ${statusClass}" onclick="openJobModal('${job.jobId}')">
                    <div class="card-body p-3">
                      <div class="d-flex justify-content-between align-items-center mb-2">
                         <strong class="text-dark fs-5">${job.plate}</strong>
                         <span class="badge bg-light text-secondary">${job.date}</span>
                      </div>
                      <div class="text-secondary fw-bold mb-2">🔧 ${job.item}</div>
                      <div class="text-muted small"><i class="fas fa-tachometer-alt"></i> เลขไมล์: ${job.mile.toLocaleString()}</div>
                    </div>
                  </div>`;
                  
      if(job.status === 'รอซ่อม') { colW.innerHTML += card; cW++; }
      else if(job.status === 'กำลังซ่อม') { colD.innerHTML += card; cD++; }
      else if(job.status === 'รออะไหล่') { colP.innerHTML += card; cP++; }
    });

    document.getElementById('cntWait').innerText = cW;
    document.getElementById('cntDoing').innerText = cD;
    document.getElementById('cntParts').innerText = cP;
  }

  function openJobModal(id) {
    currentJobId = id;
    let job = jobsData.find(j => j.jobId === id);
    document.getElementById('mPlate').innerText = job.plate;
    document.getElementById('mItem').innerText = job.item;
    document.getElementById('mMile').innerText = "เลขไมล์: " + job.mile.toLocaleString();
    document.getElementById('mCost').value = '';
    document.getElementById('mMechanic').value = '';
    new bootstrap.Modal(document.getElementById('jobModal')).show();
  }

  async function updateStatus(newStatus) {
    bootstrap.Modal.getInstance(document.getElementById('jobModal')).hide();
    document.getElementById('loadingOverlay').style.display = 'flex';
    await callAPI({ action: 'updateJobStatus', jobId: currentJobId, status: newStatus });
    Swal.fire({icon: 'success', title: 'อัปเดตคิวแล้ว', showConfirmButton: false, timer: 1000});
    loadJobs();
  }

  async function completeJob() {
    let cost = document.getElementById('mCost').value;
    let mech = document.getElementById('mMechanic').value;
    
    if(!cost || !mech) {
       Swal.fire('แจ้งเตือน', 'กรุณาระบุ "ค่าใช้จ่าย" และ "ชื่อช่าง" ให้ครบถ้วนก่อนปิดงาน', 'warning');
       return;
    }

    bootstrap.Modal.getInstance(document.getElementById('jobModal')).hide();
    document.getElementById('loadingOverlay').style.display = 'flex';
    await callAPI({ action: 'updateJobStatus', jobId: currentJobId, status: 'เสร็จสิ้น', cost: Number(cost), mechanic: mech });
    Swal.fire({icon: 'success', title: 'ปิดงานเรียบร้อย', showConfirmButton: false, timer: 1500});
    loadJobs();
  }
</script>
</body>
</html>
