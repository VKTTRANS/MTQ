<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบคิวช่าง - VKT Fleet</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f0f2f5; font-family: 'Kanit', sans-serif; }
    .navbar { background: #212529; }
    .kanban-col { min-width: 320px; flex: 1; background: #e9ecef; border-radius: 10px; padding: 15px; height: calc(100vh - 100px); overflow-y: auto; }
    .kanban-header { font-weight: bold; padding-bottom: 10px; border-bottom: 2px solid #ccc; margin-bottom: 15px; }
    .job-card { transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; border-left: 5px solid; }
    .job-card:hover { transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.15) !important; }
    .status-wait { border-color: #6c757d; }
    .status-doing { border-color: #0d6efd; }
    .status-parts { border-color: #ffc107; }
    #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
    .item-bullet { margin-bottom: 4px; font-size: 0.9rem; color: #495057; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark sticky-top mb-3 shadow-sm">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold"><i class="fas fa-tools text-warning"></i> ระบบคิวช่าง VKT</span>
    <button class="btn btn-sm btn-outline-light fw-bold" onclick="loadJobs()"><i class="fas fa-sync"></i> โหลดคิวใหม่</button>
  </div>
</nav>

<div class="container-fluid">
  <div class="row flex-nowrap overflow-auto pb-3">
    
    <div class="col-11 col-md-4 mb-3">
      <div class="kanban-col shadow-sm">
        <div class="kanban-header text-secondary"><i class="fas fa-clipboard-list"></i> รอซ่อม (<span id="cntWait">0</span>)</div>
        <div id="colWait"></div>
      </div>
    </div>
    
    <div class="col-11 col-md-4 mb-3">
      <div class="kanban-col shadow-sm bg-white border border-primary">
        <div class="kanban-header text-primary border-primary"><i class="fas fa-cogs"></i> กำลังซ่อม (<span id="cntDoing">0</span>)</div>
        <div id="colDoing"></div>
      </div>
    </div>
    
    <div class="col-11 col-md-4 mb-3">
      <div class="kanban-col shadow-sm bg-white border border-warning">
        <div class="kanban-header text-warning border-warning"><i class="fas fa-box-open"></i> รออะไหล่ (<span id="cntParts">0</span>)</div>
        <div id="colParts"></div>
      </div>
    </div>

  </div>
</div>

<div class="modal fade" id="jobModal">
  <div class="modal-dialog">
    <div class="modal-content border-0">
      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title"><i class="fas fa-wrench"></i> จัดการใบแจ้งซ่อม</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body bg-light">
        <div class="text-center mb-3">
           <h2 id="mPlate" class="fw-bold text-primary mb-1"></h2>
           <span id="mJobId" class="badge bg-secondary mb-2 fs-6"></span>
           <div id="mMile" class="small text-muted mt-1"></div>
        </div>

        <div class="d-grid gap-2 mb-4">
           <button class="btn btn-primary fw-bold py-2" onclick="updateStatus('กำลังซ่อม')"><i class="fas fa-play"></i> เริ่มซ่อม (กำลังซ่อม)</button>
           <button class="btn btn-warning text-dark fw-bold py-2" onclick="updateStatus('รออะไหล่')"><i class="fas fa-pause"></i> พักงาน (รออะไหล่)</button>
           <button class="btn btn-secondary fw-bold py-2" onclick="updateStatus('รอซ่อม')"><i class="fas fa-undo"></i> ถอยกลับ (รอซ่อม)</button>
        </div>

        <div class="card border-success shadow-sm">
           <div class="card-body">
             <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
               <h6 class="fw-bold text-success m-0"><i class="fas fa-check-circle"></i> ปิดงาน (สรุปรายการซ่อม)</h6>
               <button class="btn btn-sm btn-outline-primary rounded-pill px-3" onclick="addExtraJobItem()"><i class="fas fa-plus"></i> เพิ่มรายการช่างตรวจพบ</button>
             </div>
             
             <div id="mItemsList" class="mb-3"></div>

             <div class="mb-3">
               <label class="form-label small fw-bold">ชื่อช่าง / ผู้ซ่อม</label>
               <input type="text" id="mMechanic" class="form-control" placeholder="ระบุชื่อช่าง">
             </div>
             <button class="btn btn-success w-100 fw-bold py-2" onclick="completeJob()"><i class="fas fa-save"></i> บันทึกและปิดงาน</button>
           </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="loadingOverlay">
  <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
  <h5 class="mt-3 text-secondary fw-bold">กำลังอัปเดตข้อมูล...</h5>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyw0mIjSyoLO_E1RJmsGpBiPNiNVQiotHNcrkgCBg849wjA83Fel4l6VHYSTe0PrIC-/exec';
  
  let jobsData = [];
  let currentJobId = null;

  window.onload = loadJobs;

  async function callAPI(payload) {
    try {
      const response = await fetch(SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
      const result = await response.json();
      if (result.status === 'success') return result.data;
      throw new Error(result.message);
    } catch (error) {
      Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
      document.getElementById('loadingOverlay').style.display = 'none';
      throw error;
    }
  }

  async function loadJobs() {
    document.getElementById('loadingOverlay').style.display = 'flex';
    jobsData = await callAPI({ action: 'getMechanicJobs' });
    document.getElementById('loadingOverlay').style.display = 'none';
    renderBoard();
  }

  function renderBoard() {
    const colW = document.getElementById('colWait');
    const colD = document.getElementById('colDoing');
    const colP = document.getElementById('colParts');

    colW.innerHTML = ''; colD.innerHTML = ''; colP.innerHTML = '';
    let cW = 0, cD = 0, cP = 0;

    jobsData.forEach(job => {
      let statusClass = job.status === 'รอซ่อม' ? 'status-wait' : job.status === 'กำลังซ่อม' ? 'status-doing' : 'status-parts';
      let itemsListHtml = job.items.map(itm => `<div class="item-bullet"><i class="fas fa-wrench fa-sm text-secondary"></i> ${itm.name}</div>`).join('');

      let card = `<div class="card mb-3 shadow-sm bg-white job-card ${statusClass}" onclick="openJobModal('${job.jobId}')">
                    <div class="card-body p-3">
                      <div class="d-flex justify-content-between align-items-start mb-2">
                         <h5 class="fw-bold text-dark m-0">${job.plate}</h5>
                         <span class="text-muted small">${job.date}</span>
                      </div>
                      <div class="mb-2">
                         <span class="badge bg-secondary mb-2">${job.jobId}</span>
                      </div>
                      <div class="mb-3">
                         <div class="text-primary small fw-bold mb-1 border-bottom pb-1">รายการแจ้งซ่อม (${job.items.length})</div>
                         ${itemsListHtml}
                      </div>
                      <div class="text-muted small"><i class="fas fa-tachometer-alt"></i> เลขไมล์: ${job.mile.toLocaleString()}</div>
                    </div>
                  </div>`;
                  
      if(job.status === 'รอซ่อม') { colW.innerHTML += card; cW++; }
      else if(job.status === 'กำลังซ่อม') { colD.innerHTML += card; cD++; }
      else if(job.status === 'รออะไหล่') { colP.innerHTML += card; cP++; }
    });

    document.getElementById('cntWait').innerText = cW;
    document.getElementById('cntDoing').innerText = cD;
    document.getElementById('cntParts').innerText = cP;
  }

  function openJobModal(id) {
    currentJobId = id;
    let job = jobsData.find(j => j.jobId === id);
    document.getElementById('mPlate').innerText = job.plate;
    document.getElementById('mJobId').innerText = job.jobId;
    document.getElementById('mMile').innerText = "เลขไมล์: " + job.mile.toLocaleString();
    
    let itemsHtml = `<div class="list-group list-group-flush border rounded" id="mItemsContainer">`;
    job.items.forEach(itm => {
        itemsHtml += `
        <div class="list-group-item bg-light existing-item">
           <div class="fw-bold text-dark mb-2"><i class="fas fa-wrench text-secondary"></i> ${itm.name}</div>
           <div class="input-group input-group-sm">
             <span class="input-group-text">ราคา</span>
             <input type="number" class="form-control cost-input" data-row="${itm.row}" placeholder="0" required>
             <span class="input-group-text">บาท</span>
           </div>
        </div>`;
    });
    itemsHtml += `</div>`;
    
    document.getElementById('mItemsList').innerHTML = itemsHtml;
    document.getElementById('mMechanic').value = '';
    
    new bootstrap.Modal(document.getElementById('jobModal')).show();
  }

  function addExtraJobItem() {
      const container = document.getElementById('mItemsContainer');
      if(!container) return;
      
      const newItemHtml = `
        <div class="list-group-item bg-white border-primary border-opacity-50 new-item-row position-relative mt-2 shadow-sm">
           <button type="button" class="btn-close position-absolute top-0 end-0 m-2" style="font-size: 0.6rem;" onclick="this.closest('.new-item-row').remove()"></button>
           <div class="fw-bold text-primary mb-2"><i class="fas fa-plus-circle"></i> เพิ่มเติม (ช่างตรวจพบ)</div>
           <div class="row g-2">
             <div class="col-12">
               <input type="text" class="form-control form-control-sm new-item-name border-primary" placeholder="ระบุรายการซ่อม" required>
             </div>
             <div class="col-12">
               <div class="input-group input-group-sm border-primary">
                 <span class="input-group-text text-primary border-primary">ราคา</span>
                 <input type="number" class="form-control new-item-cost border-primary" placeholder="0" required>
                 <span class="input-group-text border-primary">บาท</span>
               </div>
             </div>
           </div>
        </div>`;
      container.insertAdjacentHTML('beforeend', newItemHtml);
  }

  async function updateStatus(newStatus) {
    bootstrap.Modal.getInstance(document.getElementById('jobModal')).hide();
    document.getElementById('loadingOverlay').style.display = 'flex';
    await callAPI({ action: 'updateJobStatus', jobId: currentJobId, status: newStatus });
    Swal.fire({icon: 'success', title: 'อัปเดตคิวแล้ว', showConfirmButton: false, timer: 1000});
    loadJobs();
  }

  async function completeJob() {
    let mech = document.getElementById('mMechanic').value;
    if(!mech) {
       Swal.fire('แจ้งเตือน', 'กรุณาระบุ "ชื่อช่าง" ก่อนปิดงาน', 'warning');
       return;
    }

    let itemCosts = {};
    let hasEmptyCost = false;
    document.querySelectorAll('.cost-input').forEach(input => {
        let val = input.value;
        if(!val) hasEmptyCost = true;
        itemCosts[input.dataset.row] = Number(val) || 0;
    });

    let newItems = [];
    let hasEmptyNew = false;
    document.querySelectorAll('.new-item-row').forEach(row => {
        let name = row.querySelector('.new-item-name').value;
        let cost = row.querySelector('.new-item-cost').value;
        if(!name || !cost) hasEmptyNew = true;
        newItems.push({ name: name, cost: Number(cost) || 0 });
    });

    if(hasEmptyCost || hasEmptyNew) {
       Swal.fire('แจ้งเตือน', 'กรุณาระบุรายละเอียดและค่าใช้จ่ายให้ครบทุกรายการ (หากฟรี ให้ใส่ 0)', 'warning');
       return;
    }

    bootstrap.Modal.getInstance(document.getElementById('jobModal')).hide();
    document.getElementById('loadingOverlay').style.display = 'flex';
    
    await callAPI({ 
       action: 'updateJobStatus', 
       jobId: currentJobId, 
       status: 'เสร็จสิ้น', 
       mechanic: mech,
       itemCosts: itemCosts,
       newItems: newItems
    });
    
    Swal.fire({icon: 'success', title: 'ปิดงานเรียบร้อย', showConfirmButton: false, timer: 1500});
    loadJobs();
  }
</script>
</body>
</html>
